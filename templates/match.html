<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔ Smash YUZU — Match</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07070f; color: #eeeef5; font-family: 'Rajdhani', sans-serif; }
    nav { display: flex; justify-content: space-between; padding: 1rem 2rem; background: #0f0f1a; border-bottom: 1px solid #252540; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; background: linear-gradient(135deg, #fff, #ff8000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .btn { padding: 0.45rem 1.1rem; border-radius: 4px; text-decoration: none; font-weight: 700; }
    .btn-ghost { background: transparent; color: #eeeef5; border: 1px solid #252540; }
    .arena { display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    .vs-arena { display: grid; grid-template-columns: 1fr auto 1fr; gap: 2rem; align-items: center; max-width: 800px; width: 100%; margin-bottom: 2rem; }
    .fighter { text-align: center; }
    .fighter-name { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; }
    .fighter-score { font-size: 3rem; font-weight: bold; color: #ff8000; }
    .vs-center { text-align: center; background: #16162a; padding: 1rem; border-radius: 12px; }
    .vs-text { font-size: 2.5rem; font-weight: bold; }
    .score-section { background: #0f0f1a; border: 1px solid #252540; border-radius: 12px; padding: 2rem; max-width: 800px; width: 100%; }
    .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.5rem; margin-top: 1rem; }
    .char-option { background: #16162a; border: 1px solid #252540; border-radius: 8px; padding: 0.5rem; cursor: pointer; text-align: center; transition: 0.2s; }
    .char-option:hover { border-color: #ff8000; }
    .stage-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .stage-option { background: #16162a; border: 1px solid #252540; border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; }
    .stage-option:hover { border-color: #ff8000; }
    .btn-primary { background: linear-gradient(135deg, #e8400a, #ff8000); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 0.5rem; }
    .btn-success { background: #3ddc84; color: #07070f; }
    .btn-danger { background: #ff5555; color: white; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #16162a; border: 1px solid #ff8000; padding: 0.8rem 1.2rem; border-radius: 8px; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .winner-announcement { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    .winner-announcement.show { display: flex; }
    .winner-name { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; background: linear-gradient(135deg, gold, orange); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .wait-turn { color: #6060a0; font-style: italic; margin-top: 1rem; }
    .step-indicator { margin-bottom: 1rem; color: #ff8000; font-weight: bold; }
  </style>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
<nav>
  <a href="/" class="logo">⚔ YUZU</a>
  <a href="/dashboard" class="btn btn-ghost">← Dashboard</a>
</nav>
<div class="arena">
  <div class="vs-arena">
    <div class="fighter">
      <div class="fighter-name" id="p1-name">Challenger</div>
      <div class="fighter-score" id="score-p1">0</div>
    </div>
    <div class="vs-center">
      <div class="vs-text">VS</div>
      <div id="game-counter">GAME 1</div>
      <div id="game-dots"></div>
    </div>
    <div class="fighter">
      <div class="fighter-name" id="p2-name">Opponent</div>
      <div class="fighter-score" id="score-p2">0</div>
    </div>
  </div>
  <div class="score-section" id="dynamic-phase">
    <div>Loading match data...</div>
  </div>
</div>
<div class="winner-announcement" id="winner-announcement">
  <div class="winner-name" id="winner-name"></div>
  <div id="winner-score"></div>
  <div id="winner-elo"></div>
  <div style="margin-top: 2rem;">Redirecting to dashboard...</div>
</div>
<div class="toast" id="toast"></div>

<script>
  // Récupération des données injectées par le serveur (via Nunjucks)
  const CHALLENGE_ID = "{{ challenge.id }}";
  const FORMAT = "{{ challenge.format }}";
  const P1_ID = "{{ challenge.challenger_id }}";
  const P1_NAME = "{{ challenger.username }}";
  const P2_ID = "{{ challenge.challenged_id }}";
  const P2_NAME = "{{ challenged.username }}";
  const MY_ID = "{{ user.id }}";
  
  // Vérification que les données existent
  if (!CHALLENGE_ID || CHALLENGE_ID === "") {
    document.getElementById('dynamic-phase').innerHTML = '<div style="color:red;">Erreur: Données du match manquantes. Retournez au <a href="/dashboard">dashboard</a>.</div>';
  } else {
    document.getElementById('p1-name').innerText = P1_NAME;
    document.getElementById('p2-name').innerText = P2_NAME;
  }
  
  const IS_STOCKS = FORMAT === 'STOCKS';
  const MAX_WINS = FORMAT === 'BO1' ? 1 : FORMAT === 'BO3' ? 2 : 3;
  
  let matchSocket = null;
  let currentState = null;
  let setFinished = false;
  
  function showToast(msg, ok=true) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = ok ? '#3ddc84' : '#ff5555';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
  
  function updateScoreDisplay(state) {
    if (!state) return;
    document.getElementById('score-p1').innerText = state.p1GamesWon;
    document.getElementById('score-p2').innerText = state.p2GamesWon;
    const dots = document.getElementById('game-dots');
    dots.innerHTML = '';
    for (let i = 0; i < state.p1GamesWon + state.p2GamesWon; i++) {
      const dot = document.createElement('span');
      dot.style.display = 'inline-block';
      dot.style.width = '12px';
      dot.style.height = '12px';
      dot.style.borderRadius = '50%';
      dot.style.margin = '0 3px';
      dot.style.background = i < state.p1GamesWon ? '#4f8ef7' : '#e8400a';
      dots.appendChild(dot);
    }
    document.getElementById('game-counter').innerHTML = `GAME ${state.gameIndex+1}`;
  }
  
  // Liste des personnages (version courte mais suffisante)
  const characters = [
    {id:"mario", name:"Mario", img:"https://www.smashbros.com/assets_v2/img/fighter/pict/mario.png"},
    {id:"donkey_kong", name:"Donkey Kong", img:"https://www.smashbros.com/assets_v2/img/fighter/pict/donkey_kong.png"},
    {id:"link", name:"Link", img:"https://www.smashbros.com/assets_v2/img/fighter/pict/link.png"},
    {id:"samus", name:"Samus", img:"https://www.smashbros.com/assets_v2/img/fighter/pict/samus.png"},
    {id:"kirby", name:"Kirby", img:"https://www.smashbros.com/assets_v2/img/fighter/pict/kirby.png"},
    {id:"fox", name:"Fox", img:"https://www.smashbros.com/assets_v2/img/fighter/pict/fox.png"},
    {id:"pikachu", name:"Pikachu", img:"https://www.smashbros.com/assets_v2/img/fighter/pict/pikachu.png"},
    {id:"marth", name:"Marth", img:"https://www.smashbros.com/assets_v2/img/fighter/pict/marth.png"},
    {id:"wolf", name:"Wolf", img:"https://www.smashbros.com/assets_v2/img/fighter/pict/wolf.png"}
  ];
  
  function showCharacterSelection(state) {
    const container = document.getElementById('dynamic-phase');
    const isMyTurn = (MY_ID === state.turn);
    container.innerHTML = `
      <h3>🎮 CHOOSE YOUR CHARACTER</h3>
      <div class="step-indicator">${isMyTurn ? 'Your turn' : `Waiting for ${state.turn === state.p1Id ? P1_NAME : P2_NAME}...`}</div>
      <div id="char-grid" class="char-grid"></div>
      ${!isMyTurn ? '<div class="wait-turn">⏳ Opponent is choosing...</div>' : ''}
    `;
    if (isMyTurn) {
      const grid = document.getElementById('char-grid');
      characters.forEach(c => {
        const div = document.createElement('div');
        div.className = 'char-option';
        div.innerHTML = `<img src="${c.img}" style="width:44px; height:44px; object-fit:contain;"><br>${c.name}`;
        div.onclick = () => {
          matchSocket.emit('char_pick', { challenge_id: CHALLENGE_ID, player_id: MY_ID, char_id: c.id, char_name: c.name });
        };
        grid.appendChild(div);
      });
    }
  }
  
  function showStageBan(state) {
    const container = document.getElementById('dynamic-phase');
    const isMyTurn = (MY_ID === state.turn);
    container.innerHTML = `
      <h3>🏛️ STAGE STRIKING</h3>
      <div><strong>Remaining:</strong> ${state.availableStages.join(', ')}</div>
      <div><strong>Banned:</strong> ${state.bannedStages.join(', ') || 'none'}</div>
      <div id="stage-grid" class="stage-grid"></div>
      ${!isMyTurn ? '<div class="wait-turn">⏳ Waiting for opponent to ban...</div>' : ''}
    `;
    if (isMyTurn) {
      const grid = document.getElementById('stage-grid');
      state.availableStages.forEach(stage => {
        const btn = document.createElement('button');
        btn.className = 'stage-option';
        btn.innerText = stage;
        btn.onclick = () => {
          matchSocket.emit('ban_stage', { challenge_id: CHALLENGE_ID, stage, by_player: MY_ID });
        };
        grid.appendChild(btn);
      });
    }
  }
  
  function showStagePick(state) {
    const container = document.getElementById('dynamic-phase');
    const isMyTurn = (MY_ID === state.turn);
    container.innerHTML = `
      <h3>🎯 CHOOSE THE STAGE</h3>
      <div><strong>Available:</strong> ${state.availableStages.join(', ')}</div>
      <div id="stage-grid" class="stage-grid"></div>
      ${!isMyTurn ? '<div class="wait-turn">⏳ Waiting for opponent to pick...</div>' : ''}
    `;
    if (isMyTurn) {
      const grid = document.getElementById('stage-grid');
      state.availableStages.forEach(stage => {
        const btn = document.createElement('button');
        btn.className = 'stage-option';
        btn.innerText = stage;
        btn.onclick = () => {
          matchSocket.emit('pick_stage', { challenge_id: CHALLENGE_ID, stage });
        };
        grid.appendChild(btn);
      });
    }
  }
  
  function showGamePlay(state) {
    const container = document.getElementById('dynamic-phase');
    container.innerHTML = `
      <h3>⚔ GAME ${state.gameIndex+1}</h3>
      <div><strong>Stage:</strong> ${state.finalStage}</div>
      <div id="game-controls"></div>
    `;
    const controls = document.getElementById('game-controls');
    if (!state.pendingProposal) {
      controls.innerHTML = `
        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1rem;">
          <button class="btn-primary" onclick="proposeWinner('${state.p1Id}')">🏆 ${P1_NAME} wins</button>
          <button class="btn-primary" onclick="proposeWinner('${state.p2Id}')">🏆 ${P2_NAME} wins</button>
        </div>
      `;
    } else {
      if (state.pendingProposal.byPlayerId !== MY_ID) {
        controls.innerHTML = `
          <div class="wait-turn" style="background: #16162a; padding: 1rem; border-radius: 8px; margin-top: 1rem;">
            <strong>${state.pendingProposal.winner_id === state.p1Id ? P1_NAME : P2_NAME}</strong> claimed the win.<br>
            Is this correct?
            <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 0.8rem;">
              <button class="btn-success" onclick="confirmGame()">✅ Yes, confirm</button>
              <button class="btn-danger" onclick="contestGame()">❌ No, contest</button>
            </div>
          </div>
        `;
      } else {
        controls.innerHTML = `<div class="wait-turn">⏳ Waiting for opponent to confirm...</div>`;
      }
    }
  }
  
  function proposeWinner(winnerId) {
    matchSocket.emit('propose_game_result', { challenge_id: CHALLENGE_ID, game_index: currentState.gameIndex, winner_id: winnerId });
  }
  function confirmGame() {
    matchSocket.emit('confirm_game_result', { challenge_id: CHALLENGE_ID, game_index: currentState.gameIndex, accepted: true });
  }
  function contestGame() {
    matchSocket.emit('confirm_game_result', { challenge_id: CHALLENGE_ID, game_index: currentState.gameIndex, accepted: false });
  }
  
  async function finishSet(winnerId) {
    if (setFinished) return;
    setFinished = true;
    const scoreStr = (winnerId === P1_ID) ? `${MAX_WINS}-${currentState.p2GamesWon}` : `${currentState.p1GamesWon}-${MAX_WINS}`;
    try {
      const res = await fetch(`/result/${CHALLENGE_ID}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ winner_id: winnerId, score: scoreStr })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('winner-name').innerText = winnerId === P1_ID ? P1_NAME : P2_NAME;
        document.getElementById('winner-score').innerText = scoreStr;
        if (data.elo_change) document.getElementById('winner-elo').innerHTML = `+${data.elo_change} ELO 🏆`;
        document.getElementById('winner-announcement').classList.add('show');
        setTimeout(() => { window.location.href = '/dashboard?done=' + CHALLENGE_ID; }, 4000);
      } else {
        showToast(data.error || 'Error submitting result', false);
      }
    } catch(e) { showToast('Network error', false); }
  }
  
  function renderPhase(state) {
    if (!state) return;
    currentState = state;
    updateScoreDisplay(state);
    if (state.setFinished) {
      if (!setFinished) finishSet(state.p1GamesWon === MAX_WINS ? state.p1Id : state.p2Id);
      return;
    }
    if (state.phase === 'character_p1' || state.phase === 'character_p2') showCharacterSelection(state);
    else if (state.phase === 'stage_ban') showStageBan(state);
    else if (state.phase === 'stage_pick') showStagePick(state);
    else if (state.phase === 'game_play') showGamePlay(state);
  }
  
  function initSocket() {
    matchSocket = io({ transports: ['websocket'] });
    matchSocket.on('connect', () => {
      console.log('Socket connected');
      matchSocket.emit('join_match', { challenge_id: CHALLENGE_ID });
      matchSocket.emit('join_user', {});
    });
    matchSocket.on('match_state', renderPhase);
    matchSocket.on('char_picked', (data) => showToast(`${data.char_name} picked`));
    matchSocket.on('stage_banned', (data) => showToast(`${data.stage} banned`));
    matchSocket.on('stage_picked', (data) => showToast(`Stage: ${data.stage}`));
    matchSocket.on('game_proposed', () => showToast(`Game result proposed, waiting for opponent`));
    matchSocket.on('game_confirmed', (data) => {
      if (data.accepted) showToast(`Game ${data.game_index+1} confirmed`);
      else showToast(`Game contested, propose again`, false);
    });
    matchSocket.on('disconnect', () => showToast('Disconnected from server', false));
  }
  
  if (IS_STOCKS) {
    document.getElementById('dynamic-phase').innerHTML = '<div>Mode STOCKS non supporté dans cette version. Utilisez BO1/BO3/BO5.</div>';
  } else if (CHALLENGE_ID && CHALLENGE_ID !== "") {
    initSocket();
  }
  
  // Exposer les fonctions globalement pour les boutons onclick
  window.proposeWinner = proposeWinner;
  window.confirmGame = confirmGame;
  window.contestGame = contestGame;
</script>
</body>
</html>
