<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔ MATCH — Smash YUZU</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Vos styles (inchangés, identiques à ceux donnés précédemment) */
  </style>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <!-- structure HTML identique -->
  <script>
    // ---------------------- CONFIG ----------------------
    const CHALLENGE_ID = "{{ challenge.id }}";
    const FORMAT       = "{{ challenge.format }}";
    const P1_ID        = "{{ challenge.challenger_id }}";
    const P1_NAME      = "{{ challenger.username }}";
    const P2_ID        = "{{ challenge.challenged_id }}";
    const P2_NAME      = "{{ challenged.username }}";
    const MY_ID        = "{{ user.id }}";
    const IS_STOCKS    = FORMAT === 'STOCKS';

    let MAX_WINS = 1;
    if (FORMAT === 'BO1') MAX_WINS = 1;
    else if (FORMAT === 'BO3') MAX_WINS = 2;
    else if (FORMAT === 'BO5') MAX_WINS = 3;

    let matchSocket = null;
    let currentState = null;
    let setFinished = false;

    // ---------------------- UTILITAIRES ----------------------
    function showToast(msg, ok=true) { /* ... */ }
    function updateScoreDisplay(state) { /* ... */ }
    function getFullCharacterList() { /* ... */ } // (la longue liste)
    function escapeHtml(s) { /* ... */ }

    // ---------------------- PHASES UI ----------------------
    function showCharacterSelection(state) { /* ... */ }
    function showStageBan(state) { /* ... */ }
    function showStagePick(state) { /* ... */ }
    function showGamePlay(state) { /* ... */ }

    function proposeWinner(winnerId) {
      matchSocket.emit('propose_game_result', { challenge_id: CHALLENGE_ID, game_index: currentState.gameIndex, winner_id: winnerId });
    }
    function confirmGame() {
      matchSocket.emit('confirm_game_result', { challenge_id: CHALLENGE_ID, game_index: currentState.gameIndex, accepted: true });
    }
    function contestGame() {
      matchSocket.emit('confirm_game_result', { challenge_id: CHALLENGE_ID, game_index: currentState.gameIndex, accepted: false });
    }

    // ---------------------- FIN DU SET ----------------------
    async function finishSet(winnerId) {
      if (setFinished) return;
      setFinished = true;
      const scoreStr = (winnerId === P1_ID) ? `${MAX_WINS}-${currentState.p2GamesWon}` : `${currentState.p1GamesWon}-${MAX_WINS}`;
      try {
        const res = await fetch(`/result/${CHALLENGE_ID}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ winner_id: winnerId, score: scoreStr })
        });
        const data = await res.json();
        if (data.success) {
          showWinnerAnnouncement(winnerId, scoreStr, data.elo_change);
          setTimeout(() => { window.location.href = '/dashboard?done=' + CHALLENGE_ID; }, 4500);
        } else {
          showToast(data.error || 'Error submitting result', false);
        }
      } catch(e) { showToast('Network error', false); }
    }

    function showWinnerAnnouncement(winnerId, score, eloChange) {
      const name = winnerId === P1_ID ? P1_NAME : P2_NAME;
      document.getElementById('winner-name-big').innerText = name;
      document.getElementById('winner-score-big').innerText = score;
      const eloLine = document.getElementById('winner-elo-line');
      if (eloChange) {
        const iWon = (winnerId === MY_ID);
        eloLine.innerHTML = iWon ? `<span style="color:var(--green);font-size:2rem;">+${eloChange} ELO 🏆</span>` : `<span style="color:var(--red);font-size:2rem;">-${eloChange} ELO</span>`;
      }
      document.getElementById('winner-announcement').classList.add('show');
    }

    // ---------------------- RENDU PRINCIPAL ----------------------
    function renderPhase(state) {
      if (!state) return;
      currentState = state;
      updateScoreDisplay(state);
      
      // 👉 Vérification de la fin du set (correction de l'écran de victoire)
      if (state.setFinished) {
        if (!setFinished) {
          setFinished = true;
          const winnerId = state.p1GamesWon === MAX_WINS ? state.p1Id : state.p2Id;
          finishSet(winnerId);
        }
        return;
      }

      if (state.phase === 'character_p1' || state.phase === 'character_p2') {
        showCharacterSelection(state);
      } else if (state.phase === 'stage_ban') {
        showStageBan(state);
      } else if (state.phase === 'stage_pick') {
        showStagePick(state);
      } else if (state.phase === 'game_play') {
        showGamePlay(state);
      }
    }

    // ---------------------- SOCKET.IO ----------------------
    function initMatchSocket() {
      matchSocket = io({ transports: ['websocket'] });
      matchSocket.emit('join_match', { challenge_id: CHALLENGE_ID });
      matchSocket.emit('join_user', {});

      matchSocket.on('match_state', (state) => {
        renderPhase(state);
      });

      matchSocket.on('char_picked', (data) => {
        showToast(`${data.char_name} picked by ${data.player_id === P1_ID ? P1_NAME : P2_NAME}`);
      });
      matchSocket.on('stage_banned', (data) => {
        showToast(`${data.stage} banned by ${data.by_player === P1_ID ? P1_NAME : P2_NAME}`);
      });
      matchSocket.on('stage_picked', (data) => {
        showToast(`Stage selected: ${data.stage}`);
      });
      matchSocket.on('game_proposed', (data) => {
        showToast(`Game ${data.game_index+1} result proposed. Waiting for confirmation.`);
      });
      matchSocket.on('game_confirmed', (data) => {
        if (data.accepted) {
          if (!data.setFinished) {
            showToast(`Game ${data.game_index+1} confirmed!`);
          }
        } else {
          showToast(`Game ${data.game_index+1} contested – propose again.`, false);
        }
      });

      matchSocket.on('chat_message', chatReceive);
      matchSocket.on('chat_history', (msgs) => { msgs.forEach(chatReceive); });
    }

    // ---------------------- CHAT ----------------------
    function chatSend() { /* ... */ }
    function chatReceive(data) { /* ... */ }

    // ---------------------- INIT ----------------------
    document.addEventListener('DOMContentLoaded', () => {
      if (IS_STOCKS) {
        document.getElementById('dynamic-phase').innerHTML = `<div class="section-title">STOCKS MODE</div><p>Mode stocks – utilisez l'interface classique.</p>`;
        showToast("Mode STOCKS – interface classique.", false);
      } else {
        initMatchSocket();
      }
      document.getElementById('chat-input').addEventListener('keydown', (e) => { if(e.key === 'Enter') chatSend(); });
    });
  </script>
</body>
</html>
