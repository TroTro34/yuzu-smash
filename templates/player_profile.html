<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Match SSBU</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        #player-selection {
            margin-bottom: 20px;
        }
        .character-btn {
            display: inline-block;
            margin-right: 10px;
            padding: 10px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        .character-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sélection des personnages et stages pour la manche suivante</h1>
        <div id="player-selection">
            <!-- Boutons de sélection des personnages -->
        </div>
        <div id="stage-selection">
            <label for="stage-select">Sélectionnez un stage :</label>
            <select id="stage-select" class="form-control"></select>
        </div>
        <button id="submit-choice" class="btn btn-primary mt-3">Valider la sélection</button>
        <div id="match-results" class="mt-4">
            <!-- Affichage des résultats en temps réel -->
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="notifications.js"></script>
    <script src="match.js"></script>
</body>
</html>
